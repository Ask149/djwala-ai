# fly.toml app configuration file generated for djwala-ai on 2026-02-28T03:38:12-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'djwala-ai'
primary_region = 'iad'

[build]

[env]
  DJWALA_DATABASE_PATH = '/data/djwala_cache.db'

[[mounts]]
  source = 'djwala_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
