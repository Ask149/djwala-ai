<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DjwalaAI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>
<body>
    <div class="container">
        <h1>DjwalaAI</h1>
        <p class="subtitle">AI-powered auto-DJ from YouTube</p>

        <div class="input-section">
            <div class="search-row">
                <input type="text" class="search-input" placeholder="Artist names, comma separated... (e.g., &quot;Arijit Singh, Pritam, AP Dhillon&quot;)">
                <button class="go-btn">DJ!</button>
            </div>
            <div class="artist-chips"></div>
        </div>

        <div class="status-bar">
            <div class="spinner"></div>
            <span class="status-text">Ready</span>
        </div>

        <div class="now-playing">
            <h3>Now Playing</h3>
            <div class="track-title"></div>
            <div class="track-meta"></div>
            <div class="next-up"></div>
        </div>

        <div class="queue">
            <h3>Queue</h3>
            <div class="queue-list"></div>
        </div>
    </div>

    <div class="players-container"></div>

    <script src="/static/js/mix-engine.js?v=5"></script>
    <script src="/static/js/app.js?v=5"></script>
</body>
</html>
