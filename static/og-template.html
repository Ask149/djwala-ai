<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
    overflow: hidden;
}
.logo {
    font-size: 72px;
    margin-bottom: 16px;
}
h1 {
    font-size: 64px;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 24px;
}
.tagline {
    font-size: 32px;
    color: #ccc;
    margin-bottom: 12px;
}
.sub {
    font-size: 22px;
    color: #888;
}
.features {
    display: flex;
    gap: 40px;
    margin-top: 40px;
}
.feature {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #999;
    font-size: 20px;
}
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #667eea;
}
</style>
</head>
<body>
    <div class="logo">🎧</div>
    <h1>DjwalaAI</h1>
    <div class="tagline">Type any artists. Get a seamless DJ mix.</div>
    <div class="sub">Like having a DJ at your party. Free.</div>
    <div class="features">
        <div class="feature"><span class="dot"></span> BPM Matching</div>
        <div class="feature"><span class="dot"></span> Harmonic Mixing</div>
        <div class="feature"><span class="dot"></span> Smooth Crossfades</div>
    </div>
</body>
</html>
